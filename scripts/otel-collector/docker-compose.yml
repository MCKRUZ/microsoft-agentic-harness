# OpenTelemetry Collector + Tempo for Agentic Harness
# Usage: docker-compose up -d
# Stop: docker-compose down
# Traces viewable in Grafana (Dashboards stack) via Tempo datasource

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: agentic-harness-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]

    volumes:
      - ./config.yaml:/etc/otel-collector-config.yaml:ro

    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector's own metrics
      - "8889:8889"   # Prometheus exporter for app metrics
      - "13133:13133" # Health check endpoint
      - "1777:1777"   # pprof profiling
      - "55679:55679" # zpages debugging UI

    environment:
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
      - TEMPO_ENDPOINT=tempo:4317
      - DEPLOYMENT_ENVIRONMENT=${DEPLOYMENT_ENVIRONMENT:-development}

    restart: unless-stopped

    networks:
      - otel-network

    depends_on:
      tempo:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:13133/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  tempo:
    image: grafana/tempo:2.7.2
    container_name: agentic-harness-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]

    volumes:
      - ./tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo

    ports:
      - "3200:3200"   # Tempo HTTP API (query frontend)

    restart: unless-stopped

    networks:
      - otel-network

    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  tempo-data:

networks:
  otel-network:
    driver: bridge
    name: agentic-harness-otel
