apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://agentic-harness-tempo:3200
    uid: tempo
    isDefault: false
    editable: false
    jsonData:
      tracesToMetrics:
        datasourceUid: prometheus
        tags:
          - key: agent.name
            value: agent_name
          - key: user.id
            value: user_id
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "-30m"
        spanEndTimeShift: "30m"
